<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2520"/>
      <stop offset="100%" style="stop-color:#1a1714"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3703f"/>
      <stop offset="100%" style="stop-color:#b03d20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle texture lines -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"
    fill="none" stroke="#3e3630" stroke-width="2" opacity="0.6"/>

  <!-- Open book base -->
  <g transform="translate(512, 660)">
    <!-- Left page -->
    <path d="M-280,-120 Q-260,-150 -10,-100 L-10,80 Q-260,30 -280,0 Z"
      fill="#3e3630" opacity="0.8"/>
    <!-- Right page -->
    <path d="M280,-120 Q260,-150 10,-100 L10,80 Q260,30 280,0 Z"
      fill="#3e3630" opacity="0.8"/>
    <!-- Spine highlight -->
    <line x1="-10" y1="-105" x2="-10" y2="82" stroke="#5c5043" stroke-width="3"/>
    <line x1="10" y1="-105" x2="10" y2="82" stroke="#5c5043" stroke-width="3"/>
    <!-- Page lines left -->
    <line x1="-240" y1="-60" x2="-30" y2="-30" stroke="#5c5043" stroke-width="1.5" opacity="0.6"/>
    <line x1="-240" y1="-30" x2="-30" y2="-5" stroke="#5c5043" stroke-width="1.5" opacity="0.6"/>
    <line x1="-240" y1="0" x2="-30" y2="20" stroke="#5c5043" stroke-width="1.5" opacity="0.6"/>
    <!-- Page lines right -->
    <line x1="240" y1="-60" x2="30" y2="-30" stroke="#5c5043" stroke-width="1.5" opacity="0.6"/>
    <line x1="240" y1="-30" x2="30" y2="-5" stroke="#5c5043" stroke-width="1.5" opacity="0.6"/>
    <line x1="240" y1="0" x2="30" y2="20" stroke="#5c5043" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Quill feather -->
  <g transform="translate(680, 220) rotate(35)">
    <!-- Feather body -->
    <path d="M0,0 Q40,-80 20,-180 Q60,-120 50,-20 Q80,-60 70,30 Q50,10 30,60 Q20,30 0,0 Z"
      fill="#9a8c76" opacity="0.7"/>
    <!-- Quill tip -->
    <path d="M0,0 L-8,40 L8,35 Z" fill="#d4522b" opacity="0.9"/>
    <!-- Quill shaft -->
    <line x1="0" y1="0" x2="-5" y2="-160" stroke="#7d6e5a" stroke-width="2"/>
  </g>

  <!-- Main letter S -->
  <text
    x="512" y="560"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="420"
    font-weight="bold"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#accent)"
    filter="url(#glow)"
    letter-spacing="-10"
  >S</text>

  <!-- Thin accent line under S -->
  <rect x="312" y="610" width="400" height="4" rx="2" fill="#d4522b" opacity="0.5"/>

  <!-- Small wordmark -->
  <text
    x="512" y="760"
    font-family="Georgia, serif"
    font-size="52"
    font-weight="normal"
    text-anchor="middle"
    fill="#9a8c76"
    letter-spacing="12"
  >SCRIPTORIUM</text>
</svg>
